<div class="px-4 lg:px-8 mt-8">
  <div *ngIf="this.isAdmin()" class="flex justify-content-end w-full my-3">
    <button
      class="font-bold bg-orange-400 p-3 m-1 border-none border-round-md text-black-alpha-90 hover:bg-orange-300"
      (click)="switchToEdit()"
    >
      <i class="pi pi-pencil"></i>
    </button>
    <button
      class="font-bold bg-red-600 p-3 m-1 border-none border-round-md text-black-alpha-90 hover:bg-red-400"
      (click)="showDialog()"
    >
      <i class="pi pi-trash"></i>
    </button>
    <button
      class="font-bold bg-primary p-3 m-1 border-none border-round-md text-black-alpha-90 hover:bg-primary-300"
      (click)="showVenueManagementDialog()"
    >
      <i class="pi pi-user-edit"></i>
    </button>
  </div>
  <form class="grid" [formGroup]="editVenueForm">
    <div class="col-12 lg:col-5 flex align-items-center justify-content-center">
      <img
        src="{{ venue?.imagePath }}"
        alt="Pupin Bar"
        class="w-full lg:w-30rem border-round-lg shadow-2"
      />
    </div>

    <div class="col-12 lg:col-7 flex flex-column justify-content-center">
      <div class="lg:pl-5">
        <div
          class="flex flex-column align-items-center lg:align-items-start gap-2"
        >
          <h1
            class="text-6xl font-bold m-0 text-center lg:text-left"
            *ngIf="!isEdit"
          >
            {{ venue?.name }}
          </h1>
          <p-floatlabel variant="in" class="my-2 w-full" *ngIf="isEdit">
            <input
              pInputText
              id="nameField"
              autocomplete="off"
              type="text"
              class="w-full"
              formControlName="name"
            />
            <label for="nameField">Name</label>
          </p-floatlabel>
          <h2
            class="text-2xl text-color-secondary font-normal m-0"
            *ngIf="!isEdit"
          >
            {{ venue?.address }}
          </h2>
          <p-floatlabel variant="in" class="my-2 w-full" *ngIf="isEdit">
            <input
              pInputText
              id="addressField"
              autocomplete="off"
              type="text"
              class="w-full"
              formControlName="address"
            />
            <label for="addressField">Address</label>
          </p-floatlabel>
          <div class="flex flex-column my-2 w-full" *ngIf="isEdit">
            <span>Venue type:</span>
            <p-select
              optionLabel="name"
              placeholder="Select venue type"
              class="my-2"
              formControlName="type"
              pTooltip="Venue type must be selected"
              [options]="VenueTypes"
            />
          </div>
          <span
            class="text-2xl"
            [style.color]="venueTypeColor()"
            *ngIf="!isEdit"
            id="venueTypeLabel"
            >{{ venueType }}</span
          >
        </div>

        <p
          class="mt-6 line-height-3 text-color-secondary text-center lg:text-left"
          *ngIf="!isEdit"
        >
          {{ venue?.description }}
        </p>
        <div class="my-2 w-full" *ngIf="isEdit">
          <span>Description:</span>
          <textarea
            rows="6"
            pTextarea
            style="resize: none"
            class="w-full text-white bg-black-alpha-10 border-gray-600 my-2"
            formControlName="description"
            pTooltip="Description field can't be empty"
          >
          </textarea>
        </div>
        <p-button
          (onClick)="discardChanges()"
          class="font-bold mr-1"
          *ngIf="isEdit"
          severity="danger"
          label="Cancel"
        ></p-button>
        <p-button
          (onClick)="submitChanges()"
          class="font-bold"
          *ngIf="isEdit"
          [disabled]="!this.editVenueForm.valid"
          [loading]="isLoading"
          severity="success"
          >Submit</p-button
        >
      </div>
    </div>
    <div
      class="col-12 mt-7 flex justify-content-center align-items-center flex-column"
    >
      <span class="text-4xl font-light">Upcoming events</span>
      <div
        class="border-top-1 border-white-alpha-50 border-2 w-full my-3"
      ></div>
    </div>

    <div class="col-12"></div>
  </form>
</div>

<!-- Delete dialog -->
<p-dialog
  header="Delete Venue"
  [modal]="true"
  [(visible)]="isDeleteDialogVisible"
  [style]="{ width: '25rem' }"
  draggable="false"
>
  <div class="border-top-1 border-bottom-1 border-gray-600">
    <p>
      Are you sure you want to delete this venue? This action can't be undone!
    </p>
  </div>
  <div class="mt-3 flex justify-content-end">
    <p-button
      severity="success"
      class="mr-1 font-bold"
      (onClick)="deleteVenue()"
      >Confirm</p-button
    >
    <p-button severity="danger" class="font-bold" (onClick)="hideDialog()"
      >Cancel</p-button
    >
  </div>
</p-dialog>

<!-- Manage venue managers dialog -->
<p-dialog
  header="Manage Venue Managers"
  [modal]="true"
  [(visible)]="isManagementDialogVisible"
  [style]="{ width: '30rem' }" 
  [draggable]="false">

  <!-- Main Content Area -->
  <div class="field">
    <label for="venue-managers" class="font-semibold">Select Venue Managers</label>
    <p-multiSelect  
        id="venue-managers"
        placeholder="Select Managers" 
        optionLabel="name"
        [maxSelectedLabels]="5"
        dataKey="id"
        styleClass="w-full"
        [(ngModel)]="selectedUsers" 
        virtualScroll="true"
        appendTo="body"
        [options]="this.managerOptions"
        optionLabel="username"
        >
    </p-multiSelect>
  </div>

  <ng-template pTemplate="footer">
    <p-button 
        label="Cancel" 
        severity="danger"
        icon="pi pi-times" 
        styleClass="p-button"
        (click)="isManagementDialogVisible = false">
    </p-button>
    <p-button 
        label="Submit" 
        icon="pi pi-check"
        (onClick)="submitManagerSelection()">
    </p-button>
  </ng-template>

</p-dialog>
